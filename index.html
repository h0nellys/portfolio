<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портфолио Дизайнера</title>
    <style>
        /* Здесь стили (CSS) - внешний вид сайта */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            text-align: center;
        }
        h1 { margin-bottom: 10px; font-size: 24px; }
        p { color: #666; line-height: 1.6; }
        .role {
            display: inline-block;
            background: #e0f2fe;
            color: #0369a1;
            padding: 5px 10px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .links { margin-top: 30px; }
        .btn {
            display: block;
            width: 100%;
            padding: 12px 0;
            margin-bottom: 10px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: 0.3s;
        }
        .btn:hover { background: #1d4ed8; }
        .btn.secondary { background: #e5e7eb; color: #333; }
        .btn.secondary:hover { background: #d1d5db; }
    </style>
</head>
<body>

    <div class="card">
        <!-- ВАШЕ ФОТО (можно вставить ссылку на картинку) -->
        <!-- <img src="ссылка_на_фото.jpg" width="100" style="border-radius: 50%; margin-bottom: 15px;"> -->
        
        <h1>Привет, я [Ваше Имя] 👋</h1>
        <div class="role">Junior Web Designer</div>
        
        <p>
            Создаю удобные интерфейсы в Figma.<br>
            Понимаю основы HTML/CSS.<br>
            Ищу первую работу в команде! 🚀
        </p>

        <div class="links">
            <!-- Замените # на реальные ссылки -->
            <a href="#" class="btn">Мое портфолио (Behance)</a>
            <a href="https://t.me/ваш_ник" class="btn secondary">Написать в Telegram</a>
        </div>
    </div>

</body>
</html>
